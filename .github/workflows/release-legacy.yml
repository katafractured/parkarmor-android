name: Release (legacy keystore)

on:
  workflow_dispatch:
    inputs:
      version_code:
        description: 'versionCode to embed'
        required: true
        default: '8'

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Decode keystore (original Apr-10 GH-secret key)
        run: |
          mkdir -p keystore
          printf '%s' "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore/parkarmor-release.p12

      - name: Build release AAB
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew bundleRelease --no-daemon -PversionCode=${{ github.event.inputs.version_code }}

      - name: Upload AAB to Play — internal track (draft)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName:        com.katafract.parkarmor
          releaseFiles:       app/build/outputs/bundle/release/*.aab
          track:              internal
          status:             draft

      - name: Cleanup
        if: always()
        run: rm -f keystore/parkarmor-release.p12
