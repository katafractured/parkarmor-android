name: Backup keystore secrets to Infisical

on:
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      INFISICAL_API: https://secrets.katafract.io
      INFISICAL_PROJECT: f51b990a-63ba-4ce0-a388-cb9aadc42383
      INFISICAL_ENV: prod
      INFISICAL_PATH: /android
      APP_PREFIX: PARKARMOR_ANDROID
    steps:
      - name: Push legacy keystore secrets to Infisical
        env:
          INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
          INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail
          TOK=$(curl -fsS -X POST "$INFISICAL_API/api/v1/auth/universal-auth/login" \
            -H 'Content-Type: application/json' \
            -d "$(jq -nc --arg cid "$INFISICAL_CLIENT_ID" --arg sec "$INFISICAL_CLIENT_SECRET" '{clientId:$cid, clientSecret:$sec}')" \
            | jq -r .accessToken)
          if [ -z "$TOK" ] || [ "$TOK" = "null" ]; then
            echo "Infisical auth failed" >&2; exit 1
          fi
          push() {
            local key="$1" val="$2"
            local body code
            body=$(jq -nc --arg w "$INFISICAL_PROJECT" --arg e "$INFISICAL_ENV" --arg p "$INFISICAL_PATH" --arg v "$val" \
              '{workspaceId:$w, environment:$e, secretPath:$p, secretValue:$v}')
            code=$(curl -sS -o /tmp/resp -w '%{http_code}' -X PATCH \
              "$INFISICAL_API/api/v3/secrets/raw/$key" \
              -H "Authorization: Bearer $TOK" -H 'Content-Type: application/json' -d "$body")
            if [ "$code" = "404" ] || [ "$code" = "400" ]; then
              code=$(curl -sS -o /tmp/resp -w '%{http_code}' -X POST \
                "$INFISICAL_API/api/v3/secrets/raw/$key" \
                -H "Authorization: Bearer $TOK" -H 'Content-Type: application/json' -d "$body")
            fi
            if [ "$code" != "200" ]; then
              echo "FAIL $key -> HTTP $code" >&2
              cat /tmp/resp >&2
              exit 1
            fi
            echo "ok $key"
          }
          push "${APP_PREFIX}_KEYSTORE_B64"      "$KEYSTORE_BASE64"
          push "${APP_PREFIX}_KEYSTORE_PASSWORD" "$KEYSTORE_PASSWORD"
          push "${APP_PREFIX}_KEY_ALIAS"         "$KEY_ALIAS"
          push "${APP_PREFIX}_KEY_PASSWORD"      "$KEY_PASSWORD"
